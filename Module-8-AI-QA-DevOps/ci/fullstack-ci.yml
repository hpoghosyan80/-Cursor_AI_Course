name: Full-Stack CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: fullstack-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write
  pull-requests: read
  packages: write

jobs:
  # ─── CHANGE DETECTION (skip unchanged modules → ~50% faster on scoped PRs) ───

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      qa: ${{ steps.filter.outputs.qa }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'Module-6-AI-Frontend-Development/**'
            backend:
              - 'Module-7-AI-Backend-Development/**'
            qa:
              - 'Module-8-AI-QA-DevOps/**'
            docker:
              - 'Module-6-AI-Frontend-Development/Dockerfile'
              - 'Module-7-AI-Backend-Development/Dockerfile'
              - '.github/workflows/fullstack-ci.yml'

  # ─── DEPENDENCY INSTALL + CACHE (single install per stack, reused by test jobs) ─

  deps-frontend:
    name: Cache · Frontend Deps
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: Module-6-AI-Frontend-Development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: Module-6-AI-Frontend-Development/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('Module-6-AI-Frontend-Development/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Module-6-AI-Frontend-Development/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Cache Vite pre-bundle
        uses: actions/cache@v4
        with:
          path: Module-6-AI-Frontend-Development/node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('Module-6-AI-Frontend-Development/package-lock.json') }}
          restore-keys: vite-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit

  deps-backend:
    name: Cache · Backend Deps
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.qa == 'true' || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache backend venv
        id: venv-backend
        uses: actions/cache@v4
        with:
          path: Module-7-AI-Backend-Development/.venv
          key: venv-backend-${{ runner.os }}-${{ hashFiles('Module-7-AI-Backend-Development/requirements.txt') }}
          restore-keys: venv-backend-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: Module-7-AI-Backend-Development
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt pytest-xdist

      - name: Cache QA venv
        uses: actions/cache@v4
        with:
          path: Module-8-AI-QA-DevOps/.venv
          key: venv-qa-${{ runner.os }}-${{ hashFiles('Module-8-AI-QA-DevOps/requirements.txt') }}
          restore-keys: venv-qa-${{ runner.os }}-

      - name: Install QA dependencies
        working-directory: Module-8-AI-QA-DevOps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

  # ─── BUILD (parallel, uses cached deps) ───────────────────────────────────────

  build-frontend:
    name: Build · Frontend
    runs-on: ubuntu-latest
    needs: [changes, deps-frontend]
    if: |
      always() && !cancelled() &&
      (needs.changes.outputs.frontend == 'true' || github.event_name != 'pull_request') &&
      (needs.deps-frontend.result == 'success' || needs.deps-frontend.result == 'skipped')
    defaults:
      run:
        working-directory: Module-6-AI-Frontend-Development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: Module-6-AI-Frontend-Development/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('Module-6-AI-Frontend-Development/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install & build
        run: |
          npm ci --prefer-offline --no-audit
          npm run lint
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Module-6-AI-Frontend-Development/dist
          retention-days: 14

  docker-backend:
    name: Build · Backend Docker
    runs-on: ubuntu-latest
    needs: [changes, deps-backend]
    if: |
      always() && !cancelled() &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.docker == 'true' || github.event_name != 'pull_request') &&
      (needs.deps-backend.result == 'success' || needs.deps-backend.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image (GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: Module-7-AI-Backend-Development
          push: false
          load: true
          tags: backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Verify container health
        run: |
          docker run -d --name api-green -p 5000:5000 \
            -e SECRET_KEY=ci-secret -e JWT_SECRET_KEY=ci-jwt \
            backend:${{ github.sha }}
          for i in $(seq 1 12); do
            if curl -sf http://localhost:5000/health; then
              echo "Container healthy"
              docker stop api-green
              exit 0
            fi
            sleep 5
          done
          docker logs api-green
          exit 1

  docker-frontend:
    name: Build · Frontend Docker
    runs-on: ubuntu-latest
    needs: [changes, deps-frontend]
    if: |
      always() && !cancelled() &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.docker == 'true' || github.event_name != 'pull_request') &&
      (needs.deps-frontend.result == 'success' || needs.deps-frontend.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image (GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: Module-6-AI-Frontend-Development
          push: false
          load: true
          tags: frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─── SECURITY (parallel matrix: Snyk + npm audit + SAST) ─────────────────────

  security:
    name: Security · ${{ matrix.scan }}
    runs-on: ubuntu-latest
    needs: [changes, deps-frontend, deps-backend]
    if: always() && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        scan: [npm-audit, snyk-npm, snyk-python, bandit]
    steps:
      - uses: actions/checkout@v4

      - name: npm audit
        if: matrix.scan == 'npm-audit' && (needs.changes.outputs.frontend == 'true' || github.event_name != 'pull_request')
        working-directory: Module-6-AI-Frontend-Development
        run: |
          npm ci --prefer-offline --no-audit
          npm audit --audit-level=high

      - name: Snyk npm scan
        if: matrix.scan == 'snyk-npm' && (needs.changes.outputs.frontend == 'true' || github.event_name != 'pull_request')
        continue-on-error: true
        working-directory: Module-6-AI-Frontend-Development
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          npm ci --prefer-offline --no-audit
          if [[ -z "$SNYK_TOKEN" ]]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          snyk test --severity-threshold=high

      - name: Snyk Python scan
        if: matrix.scan == 'snyk-python' && (needs.changes.outputs.backend == 'true' || github.event_name != 'pull_request')
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          if [[ -z "$SNYK_TOKEN" ]]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          snyk test --file=Module-7-AI-Backend-Development/requirements.txt --severity-threshold=high

      - name: Bandit + pip-audit
        if: matrix.scan == 'bandit'
        run: |
          pip install bandit pip-audit
          bandit -r Module-7-AI-Backend-Development/app Module-8-AI-QA-DevOps/src --severity-level high -q
          pip-audit -r Module-7-AI-Backend-Development/requirements.txt
          pip-audit -r Module-8-AI-QA-DevOps/requirements.txt

  security-dependency-review:
    name: Security · PR Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ─── TEST (fully parallel — no serial build→test chain) ────────────────────────

  test-e2e:
    name: Test · E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [changes, deps-frontend]
    if: |
      always() && !cancelled() &&
      (needs.changes.outputs.frontend == 'true' || github.event_name != 'pull_request') &&
      needs.deps-frontend.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    defaults:
      run:
        working-directory: Module-6-AI-Frontend-Development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            Module-6-AI-Frontend-Development/node_modules
            ~/.cache/ms-playwright
          key: npm-${{ runner.os }}-${{ hashFiles('Module-6-AI-Frontend-Development/package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit
          npx playwright install ${{ matrix.browser }} --with-deps

      - name: Run Playwright
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          CI: true

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.browser }}
          path: Module-6-AI-Frontend-Development/docs/test-report/html
          retention-days: 7

  test-backend:
    name: Test · Backend (pytest)
    runs-on: ubuntu-latest
    needs: [changes, deps-backend]
    if: |
      always() && !cancelled() &&
      (needs.changes.outputs.backend == 'true' || github.event_name != 'pull_request') &&
      needs.deps-backend.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore backend venv
        uses: actions/cache@v4
        with:
          path: Module-7-AI-Backend-Development/.venv
          key: venv-backend-${{ runner.os }}-${{ hashFiles('Module-7-AI-Backend-Development/requirements.txt') }}

      - name: Run pytest (parallel workers)
        working-directory: Module-7-AI-Backend-Development
        env:
          FLASK_APP: run.py
          SECRET_KEY: ci-secret-key
          JWT_SECRET_KEY: ci-jwt-secret
        run: |
          python -m venv .venv
          .venv/bin/pip install -q -r requirements.txt pytest-xdist
          .venv/bin/pytest -n auto --dist loadgroup

  test-qa-profile:
    name: Test · QA Profile Suite
    runs-on: ubuntu-latest
    needs: [changes, deps-backend]
    if: always() && !cancelled() && needs.deps-backend.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore QA venv
        uses: actions/cache@v4
        with:
          path: Module-8-AI-QA-DevOps/.venv
          key: venv-qa-${{ runner.os }}-${{ hashFiles('Module-8-AI-QA-DevOps/requirements.txt') }}

      - name: Run profile tests (88)
        working-directory: Module-8-AI-QA-DevOps
        run: |
          python -m venv .venv
          .venv/bin/pip install -q -r requirements.txt
          .venv/bin/python run_profile_tests.py

  test-qa-api:
    name: Test · QA REST API Suite
    runs-on: ubuntu-latest
    needs: [changes, deps-backend]
    if: always() && !cancelled() && needs.deps-backend.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore QA venv
        uses: actions/cache@v4
        with:
          path: Module-8-AI-QA-DevOps/.venv
          key: venv-qa-${{ runner.os }}-${{ hashFiles('Module-8-AI-QA-DevOps/requirements.txt') }}

      - name: Run API tests (53)
        working-directory: Module-8-AI-QA-DevOps
        run: |
          python -m venv .venv
          .venv/bin/pip install -q -r requirements.txt
          .venv/bin/python run_api_tests.py

  test-performance:
    name: Test · Performance (p95 < 500ms)
    runs-on: ubuntu-latest
    needs: [changes, deps-backend]
    if: always() && !cancelled() && needs.deps-backend.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore QA venv
        uses: actions/cache@v4
        with:
          path: Module-8-AI-QA-DevOps/.venv
          key: venv-qa-${{ runner.os }}-${{ hashFiles('Module-8-AI-QA-DevOps/requirements.txt') }}

      - name: Run performance test
        working-directory: Module-8-AI-QA-DevOps
        run: |
          python -m venv .venv
          .venv/bin/pip install -q -r requirements.txt
          .venv/bin/python scripts/performance-test.py

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: Module-8-AI-QA-DevOps/performance-report.json

  # ─── CI GATE ─────────────────────────────────────────────────────────────────

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - build-frontend
      - docker-backend
      - docker-frontend
      - security
      - test-e2e
      - test-backend
      - test-qa-profile
      - test-qa-api
      - test-performance
    if: always() && !cancelled()
    steps:
      - name: Verify required jobs
        run: |
          echo "build-frontend: ${{ needs.build-frontend.result }}"
          echo "docker-backend: ${{ needs.docker-backend.result }}"
          echo "test-e2e: ${{ needs.test-e2e.result }}"
          echo "test-backend: ${{ needs.test-backend.result }}"
          echo "test-qa-profile: ${{ needs.test-qa-profile.result }}"
          echo "test-qa-api: ${{ needs.test-qa-api.result }}"
          echo "security: ${{ needs.security.result }}"
          for result in \
            "${{ needs.build-frontend.result }}" \
            "${{ needs.docker-backend.result }}" \
            "${{ needs.test-backend.result }}" \
            "${{ needs.test-qa-profile.result }}" \
            "${{ needs.test-qa-api.result }}" \
            "${{ needs.test-performance.result }}" \
            "${{ needs.security.result }}"; do
            if [[ "$result" == "failure" ]]; then
              echo "A required job failed"
              exit 1
            fi
          done
          echo "CI gate passed"

  # ─── DEPLOY (blue-green + health checks) ─────────────────────────────────────

  deploy-green:
    name: Deploy · Green Slot
    runs-on: ubuntu-latest
    needs: ci-gate
    if: |
      success() && github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: green
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy to green slot
        run: bash Module-8-AI-QA-DevOps/scripts/blue-green-deploy.sh deploy production

      - name: Upload deployment state
        uses: actions/upload-artifact@v4
        with:
          name: deployment-state
          path: .deploy/
          retention-days: 30

  health-check-green:
    name: Deploy · Health Check (Green)
    runs-on: ubuntu-latest
    needs: deploy-green
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install smoke-test deps
        working-directory: Module-8-AI-QA-DevOps
        run: pip install -q -r requirements.txt

      - name: Green slot health checks
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_PREVIEW_URL }}
          BACKEND_URL: ${{ vars.BACKEND_STAGING_URL }}
        run: bash Module-8-AI-QA-DevOps/scripts/health-check.sh

  promote-production:
    name: Deploy · Promote Production
    runs-on: ubuntu-latest
    needs: [deploy-green, health-check-green]
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Promote blue-green
        run: |
          bash Module-8-AI-QA-DevOps/scripts/blue-green-deploy.sh promote production

      - name: Deploy GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: pages
        uses: actions/deploy-pages@v4

      - name: Deploy backend
        env:
          DEPLOY_API_URL: ${{ secrets.DEPLOY_API_URL }}
        run: bash Module-8-AI-QA-DevOps/scripts/deploy-backend.sh production

  health-check-production:
    name: Deploy · Health Check (Production)
    runs-on: ubuntu-latest
    needs: promote-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Production health checks
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_PRODUCTION_URL }}
          BACKEND_URL: ${{ vars.BACKEND_PRODUCTION_URL }}
        run: |
          pip install -q -r Module-8-AI-QA-DevOps/requirements.txt
          bash Module-8-AI-QA-DevOps/scripts/health-check.sh

  rollback:
    name: Deploy · Rollback
    runs-on: ubuntu-latest
    needs: [deploy-green, health-check-green, promote-production, health-check-production]
    if: |
      failure() && github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production-rollback
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: deployment-state
          path: .deploy

      - run: bash Module-8-AI-QA-DevOps/scripts/rollback.sh "Health check or deploy failure"

  # ─── SLACK NOTIFICATIONS ─────────────────────────────────────────────────────

  notify-slack-failure:
    name: Notify · Slack (Failures)
    runs-on: ubuntu-latest
    needs:
      - changes
      - deps-frontend
      - deps-backend
      - build-frontend
      - docker-backend
      - docker-frontend
      - security
      - test-e2e
      - test-backend
      - test-qa-profile
      - test-qa-api
      - test-performance
      - ci-gate
      - deploy-green
      - health-check-green
      - promote-production
      - health-check-production
      - rollback
    if: failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Collect failed job names
        id: failed
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = context.runId;
            const { data } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id,
            });
            const failed = data.jobs
              .filter(j => j.conclusion === 'failure')
              .map(j => j.name)
              .join(', ');
            core.setOutput('jobs', failed || 'unknown');
            return failed;

      - name: Send Slack alert
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FAILED_JOBS: ${{ steps.failed.outputs.jobs }}
        run: bash Module-8-AI-QA-DevOps/scripts/notify-slack-failure.sh

  notify-slack-success:
    name: Notify · Slack (Success)
    runs-on: ubuntu-latest
    needs: [ci-gate, promote-production]
    if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ -n "${SLACK_WEBHOOK_URL:-}" ]]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"✅ CI/CD passed on \`${GITHUB_REF_NAME}\` @ \`${GITHUB_SHA:0:7}\`\"}"
          fi
